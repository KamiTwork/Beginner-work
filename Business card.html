<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edmass Foods — Digital Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap');

  :root{
    --deep: #123821;
    --leaf: #2e7d32;
    --lime: #8bc34a;
    --brightlime: #b6e04a;
    --cream: #f6f7ee;
    --rust: #d97a3f;
    --ink: #16241a;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% -10%, rgba(139,195,74,0.25), transparent 55%),
      radial-gradient(circle at 100% 110%, rgba(18,56,33,0.5), transparent 50%),
      var(--deep);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    font-family:'Manrope', sans-serif;
  }

  .card{
    width:100%;
    max-width:380px;
    background: var(--cream);
    border-radius:28px;
    overflow:hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    position:relative;
  }

  /* ---- header / brand ---- */
  .brand{
    position:relative;
    background: linear-gradient(160deg, var(--leaf) 0%, var(--deep) 100%);
    padding:38px 28px 30px;
    color:var(--cream);
    overflow:hidden;
  }

  .brand::before{
    content:"";
    position:absolute;
    width:220px; height:220px;
    right:-70px; top:-90px;
    background: radial-gradient(circle, rgba(182,224,74,0.35), transparent 70%);
  }

  .logomark{
    position:relative; z-index:2;
    display:flex;
    justify-content:center;
    margin-bottom:6px;
  }
  .logomark img{
    width:100%;
    max-width:220px;
    height:auto;
    display:block;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
  }

  .tagline{
    position:relative; z-index:2;
    text-align:center;
    margin-top:14px;
    font-size:0.72rem;
    letter-spacing:0.28em;
    font-weight:600;
    color: var(--brightlime);
  }

  .divider{
    height:2px;
    background: linear-gradient(90deg, transparent, var(--rust) 15%, var(--rust) 85%, transparent);
  }

  /* ---- body / person ---- */
  .body{ padding:28px 28px 8px; }

  .person-name{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:1.5rem;
    color: var(--ink);
    line-height:1.2;
  }
  .person-title{
    margin-top:4px;
    font-size:0.82rem;
    font-weight:600;
    color: var(--leaf);
    letter-spacing:0.03em;
    text-transform:uppercase;
  }

  .contact-list{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:13px;
  }
  .contact-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
    font-size:0.86rem;
    color: var(--ink);
  }
  .contact-row a{ color: var(--ink); text-decoration:none; }
  .contact-row a:hover{ color: var(--leaf); }
  .icon{
    flex:0 0 auto;
    width:20px; height:20px;
    display:flex; align-items:center; justify-content:center;
    color: var(--leaf);
    margin-top:1px;
  }
  .icon svg{ width:18px; height:18px; }
  .contact-row .lines{ display:flex; flex-direction:column; gap:2px; }

  .actions{
    padding:26px 28px 30px;
    margin-top:6px;
    border-top:1px solid rgba(18,56,33,0.08);
    display:flex;
    gap:10px;
  }
  .btn{
    flex:1;
    text-align:center;
    padding:13px 10px;
    border-radius:12px;
    font-size:0.82rem;
    font-weight:700;
    letter-spacing:0.02em;
    cursor:pointer;
    border:none;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{
    background: linear-gradient(135deg, var(--leaf), var(--deep));
    color: var(--cream);
    box-shadow: 0 8px 18px -6px rgba(46,125,50,0.55);
  }
  .btn-secondary{
    background: var(--cream);
    color: var(--deep);
    border:1.5px solid rgba(18,56,33,0.18);
  }

  .footer-line{
    text-align:center;
    padding:0 28px 22px;
    font-size:0.68rem;
    color: rgba(18,56,33,0.55);
    letter-spacing:0.04em;
  }

  @media (max-width:400px){
    .wordmark{ font-size:2.2rem; }
  }
</style>
</head>
